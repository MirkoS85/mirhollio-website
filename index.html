<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mirhollio</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 78% 28%, rgba(255,45,149,0.35), transparent 18%),
        radial-gradient(circle at 18% 82%, rgba(255,45,149,0.18), transparent 16%),
        #000;
      color:white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      text-align:center;
    }

    .wrap {
      max-width:900px;
      padding:20px;
    }

    .logo {
      font-size:22px;
      margin-bottom:28px;
      opacity:0.9;
    }

    h1 {
      font-size:clamp(40px, 8vw, 90px);
      line-height:1;
      margin-bottom:20px;
      font-weight:800;
    }

    p {
      font-size:20px;
      opacity:0.8;
      margin-bottom:40px;
    }

    .btn {
      display:inline-block;
      padding:16px 32px;
      border-radius:12px;
      font-size:18px;
      font-weight:600;
      color:white;
      text-decoration:none;
      background:linear-gradient(90deg,#7c3aed,#ec4899);
      box-shadow:0 10px 30px rgba(236,72,153,0.3);
      transition:0.2s;
    }

    .btn:hover {
      transform:translateY(-2px);
      box-shadow:0 15px 40px rgba(236,72,153,0.4);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="logo">mirhollio</div>

    <h1>Trustworthy Flare Validator</h1>

    <p>
      Production-grade systems. Zero noise.
    </p>

    <a href="/home/" class="btn">
      Enter
    </a>
  </div>
</body>
</html>
