name: Update FTSO delegation snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"

permissions:
  contents: write

concurrency:
  group: ftso-delegation-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh delegation snapshot
        run: node scripts/update-ftso-delegations.mjs

      - name: Commit snapshot
        run: |
          if git diff --quiet -- data/ftso-delegations.json; then
            echo "No delegation snapshot changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ftso-delegations.json
          git commit -m "Update FTSO delegation snapshot"
          git push
