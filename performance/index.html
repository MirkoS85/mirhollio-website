<script>
  const API_URL = "https://api.oracle-daemon.com/v1/flare/providers";
  const TARGET_VOTER = "0xb5a081dec72c8c87256b7e14cfadcbc342bdeac3";
  const TARGET_DELEGATION = "0xad9105bef5e5df2eacbe2de9037a96695b00cade";

  let selectedCurrency = "USD";
  let usdToEurRate = 0.92;

  function fmtNum(value, decimals = 2) {
    const n = Number(value);
    if (!Number.isFinite(n)) return "-";
    return n.toLocaleString(undefined, {
      minimumFractionDigits: 0,
      maximumFractionDigits: decimals
    });
  }

  function fmtPct(value, decimals = 2) {
    const n = Number(value);
    if (!Number.isFinite(n)) return "-";
    const pct = n <= 1 ? n * 100 : n;
    return `${pct.toFixed(decimals)}%`;
  }

  function fmtMoney(value, currency = "USD", decimals = 2) {
    const n = Number(value);
    if (!Number.isFinite(n)) return "-";

    if (currency === "EUR") {
      return "€" + n.toLocaleString(undefined, {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    return "$" + n.toLocaleString(undefined, {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals
    });
  }

  function toPercentNumber(value) {
    const n = Number(value);
    if (!Number.isFinite(n)) return null;
    return n <= 1 ? n * 100 : n;
  }

  function setBar(barId, textId, value) {
    const pct = toPercentNumber(value);
    const bar = document.getElementById(barId);
    const text = document.getElementById(textId);

    if (pct === null) {
      if (bar) bar.style.width = "0%";
      if (text) text.textContent = "-";
      return;
    }

    const safe = Math.max(0, Math.min(pct, 100));
    if (bar) bar.style.width = `${safe}%`;
    if (text) text.textContent = `${safe.toFixed(2)}%`;
  }

  function setText(id, value) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = value ?? "-";
  }

  function updateLastUpdated() {
    const el = document.getElementById("lastUpdated");
    if (!el) return;

    el.textContent =
      "Last updated: " +
      new Date().toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZoneName: "short"
      });
  }

  function findProviderDeep(data) {
    let found = null;

    function walk(node) {
      if (found || node == null) return;

      if (Array.isArray(node)) {
        for (const item of node) walk(item);
        return;
      }

      if (typeof node === "object") {
        const voter = String(node.voterAddress || "").toLowerCase();
        const delegation = String(node.delegationAddress || "").toLowerCase();
        const name = String(node.dataProviderName || "").toLowerCase();

        if (
          voter === TARGET_VOTER ||
          delegation === TARGET_DELEGATION ||
          name === "mirsflr"
        ) {
          found = node;
          return;
        }

        for (const value of Object.values(node)) {
          walk(value);
          if (found) return;
        }
      }
    }

    walk(data);
    return found;
  }

  function getLatestEpoch(provider) {
    if (!provider?.epochData?.length) return null;
    return [...provider.epochData].sort((a, b) => Number(b.epoch) - Number(a.epoch))[0];
  }

  function pickFirstDefined(...values) {
    for (const value of values) {
      if (value !== undefined && value !== null && value !== "") {
        return value;
      }
    }
    return null;
  }

  function parseBooleanLike(value) {
    if (typeof value === "boolean") return value;
    if (typeof value === "number") {
      if (value === 1) return true;
      if (value === 0) return false;
    }
    if (typeof value === "string") {
      const v = value.trim().toLowerCase();
      if (["true", "yes", "y", "1", "registered", "pre-registered", "preregistered", "ready", "active"].includes(v)) {
        return true;
      }
      if (["false", "no", "n", "0", "not registered", "not pre-registered", "unregistered", "inactive"].includes(v)) {
        return false;
      }
    }
    return null;
  }

  function findValueByKeyDeep(node, candidateKeys) {
    if (!node || typeof node !== "object") return null;

    const lowered = candidateKeys.map(k => k.toLowerCase());
    let match = null;

    function walk(obj) {
      if (match !== null || obj == null) return;

      if (Array.isArray(obj)) {
        for (const item of obj) {
          walk(item);
          if (match !== null) return;
        }
        return;
      }

      if (typeof obj === "object") {
        for (const [key, value] of Object.entries(obj)) {
          const keyLc = key.toLowerCase();
          if (lowered.includes(keyLc)) {
            match = value;
            return;
          }
        }

        for (const value of Object.values(obj)) {
          walk(value);
          if (match !== null) return;
        }
      }
    }

    walk(node);
    return match;
  }

  function detectPreRegistration(provider, latestEpoch) {
    const keyCandidates = [
      "preRegistered",
      "preregistered",
      "preRegistration",
      "preRegistrationStatus",
      "isPreRegistered",
      "isPreregistered",
      "preRegisteredForNextEpoch",
      "preregisteredForNextEpoch",
      "isPreRegisteredForNextEpoch",
      "nextEpochPreRegistered",
      "nextEpochPreregistered",
      "registeredForNextEpoch",
      "nextEpochRegistered",
      "registrationStatus",
      "p"
    ];

    const rawValue = pickFirstDefined(
      findValueByKeyDeep(latestEpoch, keyCandidates),
      findValueByKeyDeep(provider, keyCandidates),
      latestEpoch?.voterRegistration?.preRegistered,
      latestEpoch?.voterRegistration?.isPreRegistered,
      latestEpoch?.voterRegistration?.preRegisteredForNextEpoch,
      latestEpoch?.voterRegistration?.registeredForNextEpoch,
      latestEpoch?.preRegistered,
      latestEpoch?.preregistered,
      provider?.preRegistered,
      provider?.preregistered
    );

    return {
      value: parseBooleanLike(rawValue),
      raw: rawValue
    };
  }

  function setPreRegBadge(result) {
    const badge = document.getElementById("preRegBadge");
    const text = document.getElementById("preRegBadgeText");
    const hint = document.getElementById("debugHint");

    if (!badge || !text || !hint) return;

    badge.classList.remove("ok", "no", "unknown");

    if (result.value === true) {
      badge.classList.add("ok");
      text.textContent = "Pre-registration: YES";
      hint.textContent = "Next epoch registration detected.";
      return;
    }

    if (result.value === false) {
      badge.classList.add("no");
      text.textContent = "Pre-registration: NO";
      hint.textContent = "Next epoch registration not detected.";
      return;
    }

    badge.classList.add("unknown");
    text.textContent = "Pre-registration: UNKNOWN";
    hint.textContent = result.raw != null
      ? `Raw prereg value found but not recognized: ${String(result.raw)}`
      : "No explicit prereg field detected in current API response.";
  }

  function updateCurrencyButtons() {
    const usdBtn = document.getElementById("usdBtn");
    const eurBtn = document.getElementById("eurBtn");

    if (usdBtn) usdBtn.classList.toggle("active", selectedCurrency === "USD");
    if (eurBtn) eurBtn.classList.toggle("active", selectedCurrency === "EUR");
  }

  async function loadFxRate() {
    try {
      const res = await fetch("https://api.frankfurter.app/latest?from=USD&to=EUR");
      if (!res.ok) return;
      const data = await res.json();
      const rate = Number(data?.rates?.EUR);
      if (Number.isFinite(rate) && rate > 0) {
        usdToEurRate = rate;
      }
    } catch (_) {}
  }

  function setMinimalConditionsBadge(provider) {
    const badge = document.getElementById("minConditionsBadge");
    if (!badge) return;

    badge.classList.remove("ok", "no", "unknown");

    const strikes = Number(provider?.totalStrikes);
    const passes = Number(provider?.totalPasses);

    if (Number.isFinite(strikes) && Number.isFinite(passes)) {
      if (strikes === 0 && passes > 0) {
        badge.classList.add("ok");
        badge.textContent = "Minimal Conditions: PASS";
        return;
      }

      if (strikes > 0) {
        badge.classList.add("no");
        badge.textContent = "Minimal Conditions: REVIEW";
        return;
      }
    }

    badge.classList.add("unknown");
    badge.textContent = "Minimal Conditions: UNKNOWN";
  }

  function estimateMonthlyEarnings(provider, latest) {
    const totalWeight = Number(latest?.m_dTotalWeight ?? latest?.m_totalWeight ?? 0);
    const aprPct = Number(latest?.m_dRewardRate ?? 0);

    if (!Number.isFinite(totalWeight) || totalWeight <= 0) return null;
    if (!Number.isFinite(aprPct) || aprPct <= 0) return null;

    return totalWeight * (aprPct / 100) / 12;
  }

  function updateMonthlyEarnings(provider, latest) {
    const el = document.getElementById("monthlyEarningsValue");
    if (!el) return;

    const monthlyFlr = estimateMonthlyEarnings(provider, latest);
    if (!Number.isFinite(monthlyFlr)) {
      el.textContent = "-";
      return;
    }

    const usdSpotText = document.getElementById("spotUsd")?.textContent || "";
    const eurSpotText = document.getElementById("spotEur")?.textContent || "";

    const usdSpot = Number(usdSpotText.replace(/[^\d.]/g, ""));
    const eurSpot = Number(eurSpotText.replace(/[^\d.]/g, ""));

    if (selectedCurrency === "EUR") {
      if (Number.isFinite(eurSpot) && eurSpot > 0) {
        el.textContent = fmtMoney(monthlyFlr * eurSpot, "EUR", 0);
      } else if (Number.isFinite(usdSpot) && usdSpot > 0 && Number.isFinite(usdToEurRate) && usdToEurRate > 0) {
        el.textContent = fmtMoney(monthlyFlr * usdSpot * usdToEurRate, "EUR", 0);
      } else {
        el.textContent = fmtNum(monthlyFlr, 0) + " FLR";
      }
      return;
    }

    if (Number.isFinite(usdSpot) && usdSpot > 0) {
      el.textContent = fmtMoney(monthlyFlr * usdSpot, "USD", 0);
    } else {
      el.textContent = fmtNum(monthlyFlr, 0) + " FLR";
    }
  }

  function updateNetworkShare(latest) {
    const el = document.getElementById("networkShareValue");
    if (!el) return;

    const selfStake = Number(latest?.m_dStakeWeight ?? latest?.m_stakeWeight ?? 0);
    const delegated = Number(latest?.m_dDelegationWeight ?? latest?.m_delegationWeight ?? 0);
    const totalWeight = Number(latest?.m_dTotalWeight ?? latest?.m_totalWeight ?? 0);

    if (!Number.isFinite(selfStake) || !Number.isFinite(delegated) || !Number.isFinite(totalWeight) || totalWeight <= 0) {
      el.textContent = "-";
      return;
    }

    const share = ((selfStake + delegated) / totalWeight) * 100;
    el.textContent = share.toFixed(2) + "%";
  }

  function updateRatioBar(latest) {
    const selfStake = Number(latest?.m_dStakeWeight ?? latest?.m_stakeWeight ?? 0);
    const delegated = Number(latest?.m_dDelegationWeight ?? latest?.m_delegationWeight ?? 0);
    const total = selfStake + delegated;

    const selfEl = document.getElementById("ratioSelf");
    const delegatedEl = document.getElementById("ratioDelegated");
    const selfText = document.getElementById("ratioSelfText");
    const delegatedText = document.getElementById("ratioDelegatedText");

    if (!Number.isFinite(total) || total <= 0) {
      if (selfText) selfText.textContent = "Self: -";
      if (delegatedText) delegatedText.textContent = "Delegated: -";
      return;
    }

    const selfPct = (selfStake / total) * 100;
    const delegatedPct = (delegated / total) * 100;

    if (selfEl) selfEl.style.width = `${selfPct}%`;
    if (delegatedEl) delegatedEl.style.width = `${delegatedPct}%`;

    if (selfText) selfText.textContent = `Self: ${fmtNum(selfStake, 0)} (${selfPct.toFixed(1)}%)`;
    if (delegatedText) delegatedText.textContent = `Delegated: ${fmtNum(delegated, 0)} (${delegatedPct.toFixed(1)}%)`;
  }

  function fmtDateShort(value) {
    if (!value) return "-";
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return String(value);

    return d.toLocaleString(undefined, {
      year: "numeric",
      month: "short",
      day: "numeric"
    });
  }

  function setValidatorMonitoring(provider, latest) {
    const validatorApr = pickFirstDefined(
      provider?.validatorApr,
      provider?.validatorAPR,
      provider?.validator?.apr,
      provider?.validator?.APR,
      latest?.validatorApr,
      latest?.validatorAPR
    );

    const validatorUptime = pickFirstDefined(
      provider?.validatorUptime,
      provider?.validator?.uptime,
      latest?.validatorUptime,
      latest?.uptime
    );

    const validatorConnected = pickFirstDefined(
      provider?.validatorConnected,
      provider?.connected,
      provider?.validator?.connected,
      latest?.validatorConnected
    );

    const delegatorsCount = pickFirstDefined(
      provider?.delegatorsCount,
      provider?.validator?.delegatorsCount,
      latest?.delegatorsCount
    );

    const validatorTotalStake = pickFirstDefined(
      provider?.validatorTotalStake,
      provider?.validator?.totalStake,
      provider?.totalStake,
      latest?.validatorTotalStake
    );

    const validatorSelfStake = pickFirstDefined(
      provider?.validatorSelfStake,
      provider?.validatorSelfBond,
      provider?.validator?.selfStake,
      provider?.validator?.selfBond,
      provider?.selfBond,
      latest?.validatorSelfStake
    );

    const validatorDelegatedStake = pickFirstDefined(
      provider?.validatorDelegatedStake,
      provider?.validator?.delegatedStake,
      provider?.delegatedStake,
      latest?.validatorDelegatedStake
    );

    const stakingExpiry = pickFirstDefined(
      provider?.stakingExpiry,
      provider?.validator?.stakingExpiry,
      provider?.stakingEnd,
      provider?.validator?.stakingEnd,
      latest?.stakingExpiry
    );

    setText("validatorAprValue", validatorApr != null ? fmtPct(validatorApr) : "-");
    setText("validatorUptimeValue", validatorUptime != null ? fmtPct(validatorUptime) : "-");

    setText(
      "validatorConnectedValue",
      validatorConnected === true || String(validatorConnected).toLowerCase() === "true"
        ? "YES"
        : validatorConnected === false || String(validatorConnected).toLowerCase() === "false"
        ? "NO"
        : "-"
    );

    setText("delegatorsCountValue", delegatorsCount != null ? fmtNum(delegatorsCount, 0) : "-");
    setText("validatorTotalStakeValue", validatorTotalStake != null ? fmtNum(validatorTotalStake, 0) : "-");
    setText("validatorSelfStakeValue", validatorSelfStake != null ? fmtNum(validatorSelfStake, 0) : "-");
    setText("validatorDelegatedStakeValue", validatorDelegatedStake != null ? fmtNum(validatorDelegatedStake, 0) : "-");
    setText("stakingExpiryValue", stakingExpiry != null ? fmtDateShort(stakingExpiry) : "-");
  }

  function loadExtraMetrics(provider, latest) {
    if (!latest) {
      document.getElementById("aprValue").textContent = "-";
      document.getElementById("selfBondValue").textContent = "-";
      document.getElementById("delegatedValue").textContent = "-";
      document.getElementById("totalWeightValue").textContent = "-";
      return;
    }

    const aprValue = latest.m_dRewardRate != null
      ? Number(latest.m_dRewardRate).toFixed(2) + "%"
      : "-";

    const selfBondRaw = latest.m_dStakeWeight ?? latest.m_stakeWeight ?? null;
    const delegatedRaw = latest.m_dDelegationWeight ?? latest.m_delegationWeight ?? null;
    const totalWeightRaw = latest.m_dTotalWeight ?? latest.m_totalWeight ?? null;

    let selfBondValue = selfBondRaw != null ? fmtNum(selfBondRaw, 0) : "-";
    const delegatedValue = delegatedRaw != null ? fmtNum(delegatedRaw, 0) : "-";
    const totalWeightValue = totalWeightRaw != null ? fmtNum(totalWeightRaw, 0) : "-";

    if (selfBondRaw != null && totalWeightRaw != null && Number(totalWeightRaw) > 0) {
      const selfPct = (Number(selfBondRaw) / Number(totalWeightRaw)) * 100;
      selfBondValue += ` (${selfPct.toFixed(1)}%)`;
    }

    document.getElementById("aprValue").textContent = aprValue;
    document.getElementById("selfBondValue").textContent = selfBondValue;
    document.getElementById("delegatedValue").textContent = delegatedValue;
    document.getElementById("totalWeightValue").textContent = totalWeightValue;
  }

  async function loadPerformance() {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const contentEl = document.getElementById("content");

    try {
      const res = await fetch(API_URL, {
        method: "GET",
        headers: {
          "Accept": "application/json"
        }
      });

      if (!res.ok) {
        throw new Error(`API request failed (${res.status})`);
      }

      const data = await res.json();
      const provider = findProviderDeep(data);

      if (!provider) {
        throw new Error("MirSFlr provider not found");
      }

      const latest = getLatestEpoch(provider);
      window.__providerData = provider;
      window.__latestEpochData = latest;

      setText(
        "avgRewardValue",
        provider.averageRewardPerEpoch != null ? fmtNum(provider.averageRewardPerEpoch, 2) : "-"
      );

      setText(
        "epochsValue",
        `${provider.eligibleEpochs ?? "-"} / ${provider.totalEpochs ?? "-"}`
      );

      setText(
        "passStrikeValue",
        `${provider.totalPasses ?? 0} / ${provider.totalStrikes ?? 0}`
      );

      setText(
        "feeValue",
        latest?.voterRegistration?.delegationFeeBIPS != null
          ? (Number(latest.voterRegistration.delegationFeeBIPS) / 100).toFixed(2) + "%"
          : "-"
      );

      setBar("ftsoAvailabilityBar", "ftsoAvailabilityText", provider.ftsoPerformance?.availability);
      setBar("ftsoPerformanceBar", "ftsoPerformanceText", provider.ftsoPerformance?.performance);
      setBar("performance1Bar", "performance1Text", provider.ftsoPerformance?.performance1);
      setBar("performance2Bar", "performance2Text", provider.ftsoPerformance?.performance2);
      setBar("fdcAvailabilityBar", "fdcAvailabilityText", provider.fdcPerformance?.availability);

      const preRegResult = detectPreRegistration(provider, latest);
      setPreRegBadge(preRegResult);

      loadExtraMetrics(provider, latest);
      setMinimalConditionsBadge(provider);
      updateMonthlyEarnings(provider, latest);
      updateNetworkShare(latest);
      updateRatioBar(latest);
      setValidatorMonitoring(provider, latest);

      loadingEl.style.display = "none";
      contentEl.style.display = "block";
      updateLastUpdated();
    } catch (err) {
      loadingEl.style.display = "none";
      errorEl.style.display = "block";
      errorEl.textContent = "Could not load performance: " + err.message;
      console.error(err);
      setPreRegBadge({ value: null, raw: null });
    }
  }

  document.getElementById("usdBtn")?.addEventListener("click", () => {
    selectedCurrency = "USD";
    updateCurrencyButtons();
    if (window.__providerData && window.__latestEpochData) {
      updateMonthlyEarnings(window.__providerData, window.__latestEpochData);
    }
  });

  document.getElementById("eurBtn")?.addEventListener("click", () => {
    selectedCurrency = "EUR";
    updateCurrencyButtons();
    if (window.__providerData && window.__latestEpochData) {
      updateMonthlyEarnings(window.__providerData, window.__latestEpochData);
    }
  });

  updateCurrencyButtons();
  loadPerformance();
  loadFxRate();
</script>
