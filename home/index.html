<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MirSFlr</title>

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: #030306;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    .page {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      background:
        radial-gradient(560px 340px at 79% 19%, rgba(255, 57, 162, 0.50), transparent 42%),
        radial-gradient(420px 260px at 16% 76%, rgba(255, 46, 145, 0.28), transparent 40%),
        radial-gradient(460px 240px at 56% 41%, rgba(142, 56, 255, 0.10), transparent 48%),
        #020204;
    }

    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(700px 420px at 78% 20%, rgba(255, 45, 149, 0.26), transparent 45%),
        radial-gradient(520px 320px at 15% 79%, rgba(255, 45, 149, 0.16), transparent 42%);
      filter: blur(44px);
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.10;
      mix-blend-mode: soft-light;
      background-image:
        radial-gradient(rgba(255,255,255,.12) 0.6px, transparent 0.6px);
      background-size: 7px 7px;
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 110px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 28px 42px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .brand img {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
    }

    .menu {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 0;
      cursor: default;
      padding: 0;
      margin-top: 2px;
    }

    .menuLines {
      width: 29px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .menuLines span {
      display: block;
      height: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,0.95);
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 120px 24px 170px;
    }

    .heroInner {
      width: min(100%, 980px);
      transform: translateY(-24px);
    }

    h1 {
      font-size: clamp(46px, 5.4vw, 78px);
      line-height: 1.05;
      letter-spacing: -0.055em;
      font-weight: 500;
      margin-bottom: 18px;
    }

    h1 strong {
      font-weight: 800;
      color: #fff;
    }

    .subline {
      display: block;
      margin-top: 10px;
      font-weight: 400;
      letter-spacing: -0.04em;
    }

    .desc {
      max-width: 820px;
      margin: 0 auto 38px;
      color: rgba(214, 214, 226, 0.62);
      font-size: 18px;
      line-height: 1.58;
      letter-spacing: -0.02em;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 232px;
      height: 56px;
      padding: 0 30px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #5b2eff 0%, #ff2f92 100%);
      box-shadow: 0 10px 28px rgba(255, 47, 146, 0.22);
    }

    .features {
      position: absolute;
      left: 50%;
      bottom: 58px;
      transform: translateX(-50%);
      width: min(100%, 980px);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 26px;
      padding: 0 24px;
    }

    .feature {
      text-align: center;
      color: rgba(203, 199, 226, 0.82);
    }

    .featureIcon {
      height: 52px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
    }

    .featureIcon svg {
      width: 34px;
      height: 34px;
      stroke: rgba(198, 189, 235, 0.92);
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .featureLabel {
      font-size: 15px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    @media (max-width: 900px) {
      .topbar {
        padding: 22px 18px 0;
        height: 90px;
      }

      .brand {
        font-size: 20px;
      }

      .hero {
        padding: 110px 18px 150px;
      }

      .heroInner {
        transform: none;
      }

      h1 {
        font-size: clamp(40px, 10vw, 58px);
      }

      .desc {
        font-size: 17px;
        max-width: 640px;
      }

      .features {
        grid-template-columns: repeat(2, 1fr);
        gap: 24px 10px;
        bottom: 30px;
      }
    }

    @media (max-width: 560px) {
      body {
        overflow-y: auto;
      }

      .page {
        min-height: 100dvh;
      }

      .hero {
        padding-bottom: 220px;
      }

      .features {
        grid-template-columns: 1fr 1fr;
        width: 100%;
      }

      .featureLabel {
        font-size: 14px;
      }

      .desc {
        font-size: 16px;
      }

      .cta {
        min-width: 210px;
        height: 54px;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="grain"></div>

    <div class="topbar">
      <a class="brand" href="/" aria-label="MirSFlr">
        <img src="/logo.png" alt="MirSFlr logo">
        <span>MirSFlr</span>
      </a>

      <button class="menu" aria-label="Menu" type="button">
        <span class="menuLines">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    </div>

    <main class="hero">
      <div class="heroInner">
        <h1>
          Trustworthy <strong>Flare Validator</strong>
          <span class="subline">&amp; FTSO Provider</span>
        </h1>

        <p class="desc">
        Monitoring and describing production-grade systems. Stay reliably
        connected to the Flare Network without the marketing noise.
        </p>

        <a class="cta" href="/home/">Visit the Dashboard</a>
      </div>
    </main>

    <section class="features" aria-label="Highlights">
      <div class="feature">
        <div class="featureIcon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 7v5l3 3"></path>
            <circle cx="12" cy="13" r="8"></circle>
            <path d="M5.6 19.4 4 21"></path>
            <path d="M18.4 19.4 20 21"></path>
          </svg>
        </div>
        <div class="featureLabel">High uptime</div>
      </div>

      <div class="feature">
        <div class="featureIcon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 5 6v5c0 5 3.5 8 7 10 3.5-2 7-5 7-10V6l-7-3z"></path>
            <path d="m9.5 12 1.8 1.8 3.7-3.8"></path>
          </svg>
        </div>
        <div class="featureLabel">Secure systems</div>
      </div>

      <div class="feature">
        <div class="featureIcon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-3.5-3.5"></path>
          </svg>
        </div>
        <div class="featureLabel">Transparent</div>
      </div>

      <div class="feature">
        <div class="featureIcon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m12 4 7 3.5-7 3.5-7-3.5L12 4z"></path>
            <path d="m5 12 7 3.5 7-3.5"></path>
            <path d="m5 16.5 7 3.5 7-3.5"></path>
          </svg>
        </div>
        <div class="featureLabel">No shortcuts</div>
      </div>
    </section>
  </div>
</body>
</html>
