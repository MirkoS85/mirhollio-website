<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MirSFlr Addresses</title>

<style>

:root{
--bg:#070b14;
--panel:rgba(255,255,255,.05);
--border:rgba(255,255,255,.1);
--text:white;
--muted:rgba(255,255,255,.6);
}

body{
margin:0;
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
color:var(--muted);
margin-bottom:30px;
}

.card{
background:var(--panel);
border:1px solid var(--border);
border-radius:16px;
padding:20px;
margin-bottom:18px;
}

.label{
font-size:14px;
color:var(--muted);
margin-bottom:6px;
}

.value{
font-size:18px;
word-break:break-all;
margin-bottom:10px;
}

button{
background:#4f46e5;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

button:hover{
opacity:.85;
}

.nav{
margin-bottom:30px;
}

.nav a{
margin-right:10px;
text-decoration:none;
background:var(--panel);
border:1px solid var(--border);
padding:8px 12px;
border-radius:10px;
color:white;
}

</style>
</head>

<body>

<div class="container">

<div class="topbar">
<a class="btn" href="/">← Back to home</a>

<div style="display:flex; gap:10px; flex-wrap:wrap;">
<a class="btn" href="/stats/">Stats</a>
<a class="btn" href="/epochs/">Epochs</a>
<a class="btn" href="/addresses/" style="background:#7c5cff; border-color:#7c5cff; color:white;">Addresses</a>
<a class="btn" href="/performance/">Performance</a>
<a class="btn" href="https://api.oracle-daemon.com/v1/flare/providers" target="_blank" rel="noopener">API</a>
</div>
</div>

<h1>MirSFlr Addresses</h1>
<div class="subtitle">Provider identity and operational addresses</div>

<div id="addresses"></div>

</div>

<script>

const API_URL = "https://api.oracle-daemon.com/v1/flare/providers";
const TARGET_VOTER = "0xb5a081dec72c8c87256b7e14cfadcbc342bdeac3";

function copy(text){
navigator.clipboard.writeText(text);
alert("Copied");
}

function findProviderDeep(data){

let found=null;

function walk(node){

if(found || node==null) return;

if(Array.isArray(node)){
for(const item of node) walk(item);
return;
}

if(typeof node==="object"){

const voter=(node.voterAddress||"").toLowerCase();

if(voter===TARGET_VOTER){
found=node;
return;
}

for(const value of Object.values(node)){
walk(value);
if(found) return;
}

}

}

walk(data);
return found;

}

async function load(){

const res = await fetch(API_URL);
const data = await res.json();

const provider = findProviderDeep(data);

const list = [
["Voter Address",provider.voterAddress],
["Delegation Address",provider.delegationAddress],
["Submit Address",provider.submitAddress],
["Submit Signature Address",provider.submitSignatureAddress],
["Signing Policy Address",provider.signingPolicyAddress]
];

const container = document.getElementById("addresses");

list.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`

<div class="label">${item[0]}</div>

<div class="value">${item[1]}</div>

<button onclick="copy('${item[1]}')">Copy</button>

`;

container.appendChild(div);

});

}

load();

</script>

</body>
</html>
