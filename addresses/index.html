<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MirSFlr Addresses</title>

<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">
<link rel="apple-touch-icon" sizes="180x180" href="/logo.png">
  
<link rel="icon" type="image/png" href="/favicon.png">
<style>
:root{
  --bg:#070b14;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.62);

  --panel:rgba(255,255,255,.05);
  --panel2:rgba(255,255,255,.03);
  --border:rgba(255,255,255,.10);
  --shadow:0 18px 60px rgba(0,0,0,.34);

  --brand:#7c5cff;
  --brandPink:#ff2f92;
}

*,
*::before,
*::after{
  box-sizing:border-box;
}

html,body{
  min-height:100%;
}

body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(720px 420px at 79% 19%, rgba(255, 51, 153, 0.34), transparent 40%),
    radial-gradient(520px 320px at 15% 77%, rgba(255, 51, 153, 0.20), transparent 34%),
    radial-gradient(500px 280px at 54% 40%, rgba(123, 49, 255, 0.12), transparent 42%),
    #020204;
  overflow-x:hidden;
  position:relative;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(1200px 800px at -10% 50%, rgba(7,11,20,.42), transparent 68%),
    radial-gradient(1200px 800px at 110% 50%, rgba(7,11,20,.42), transparent 68%);
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  background:
    radial-gradient(680px 380px at 79% 18%, rgba(255, 51, 153, 0.24), transparent 38%),
    radial-gradient(500px 300px at 15% 77%, rgba(255, 51, 153, 0.14), transparent 34%),
    radial-gradient(460px 260px at 54% 40%, rgba(123, 49, 255, 0.10), transparent 40%);
  filter: blur(46px);
}

.container{
  position:relative;
  z-index:1;
  max-width:1100px;
  margin:auto;
  padding:40px 20px 56px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:10px 14px;
  border-radius:14px;
  background:linear-gradient(180deg, var(--panel), var(--panel2));
  border:1px solid var(--border);
  color:var(--text);
  font-weight:800;
  text-decoration:none;
  box-shadow:0 8px 22px rgba(0,0,0,.18);
  transition:transform .14s ease, background .14s ease, border-color .14s ease;
}

.btn:hover{
  transform:translateY(-1px);
  background:linear-gradient(135deg, rgba(124,92,255,.18), rgba(255,47,146,.08));
  border-color:rgba(124,92,255,.22);
}

h1{
  position:relative;
  z-index:1;
  font-size:36px;
  line-height:1.06;
  letter-spacing:-0.03em;
  margin:0 0 10px;
}

.subtitle{
  position:relative;
  z-index:1;
  color:var(--muted);
  margin-bottom:30px;
}

.card{
  position:relative;
  z-index:1;
  background:linear-gradient(180deg, var(--panel), var(--panel2));
  border:1px solid var(--border);
  border-radius:18px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}

.label{
  font-size:13px;
  font-weight:800;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
}

.value{
  font-size:18px;
  line-height:1.5;
  word-break:break-all;
  margin-bottom:12px;
  color:var(--text);
}

button{
  background:linear-gradient(135deg, var(--brand), var(--brandPink));
  border:none;
  color:white;
  padding:9px 13px;
  border-radius:10px;
  cursor:pointer;
  font-weight:800;
  box-shadow:0 10px 24px rgba(124,92,255,.18);
}

button:hover{
  opacity:.92;
}

@media (max-width: 700px){
  .container{
    padding:24px 14px 40px;
  }

  h1{
    font-size:30px;
  }

  .topbar{
    align-items:flex-start;
  }

  .topbar > div{
    width:100%;
  }
}
</style></head>

<body>

<div class="container">

<div class="topbar">
 <a class="btn" href="/home/">← Back to home</a>

  <div style="display:flex; gap:10px; flex-wrap:wrap;">
    <a class="btn" href="/stats/">Stats</a>
    <a class="btn" href="/epochs/">Epochs</a>
    <a class="btn" href="/addresses/" style="background:#7c5cff; border-color:#7c5cff; color:white;">Addresses</a>
    <a class="btn" href="/performance/">Performance</a>
    <a class="btn" href="https://api.oracle-daemon.com/v1/flare/providers" target="_blank" rel="noopener">API</a>
  </div>
</div>

<h1>MirSFlr Addresses</h1>
<div class="subtitle">Provider identity and operational addresses</div>

<div id="addresses"></div>

</div>

<script>

const API_URL = "https://api.oracle-daemon.com/v1/flare/providers";
const TARGET_VOTER = "0xb5a081dec72c8c87256b7e14cfadcbc342bdeac3";

function copy(text){
navigator.clipboard.writeText(text);
alert("Copied");
}

function findProviderDeep(data){

let found=null;

function walk(node){

if(found || node==null) return;

if(Array.isArray(node)){
for(const item of node) walk(item);
return;
}

if(typeof node==="object"){

const voter=(node.voterAddress||"").toLowerCase();

if(voter===TARGET_VOTER){
found=node;
return;
}

for(const value of Object.values(node)){
walk(value);
if(found) return;
}

}

}

walk(data);
return found;

}

async function load(){

const res = await fetch(API_URL);
const data = await res.json();

const provider = findProviderDeep(data);

const list = [
["Voter Address",provider.voterAddress],
["Delegation Address",provider.delegationAddress],
["Submit Address",provider.submitAddress],
["Submit Signature Address",provider.submitSignatureAddress],
["Signing Policy Address",provider.signingPolicyAddress]
];

const container = document.getElementById("addresses");

list.forEach(item=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`

<div class="label">${item[0]}</div>

<div class="value">${item[1]}</div>

<button onclick="copy('${item[1]}')">Copy</button>

`;

container.appendChild(div);

});

}

load();

</script>

</body>
</html>
